<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoHeads: Pro Edition</title>
    <style>
        :root { --primary: #1b5e20; --secondary: #01579b; --correct: #2e7d32; --pass: #c62828; --light: #f1f8e9; }
        body { font-family: sans-serif; margin: 0; background: var(--light); text-align: center; height: 100vh; display: flex; flex-direction: column; overflow: hidden; touch-action: manipulation; }
        .screen { display: none; padding: 20px; flex-grow: 1; flex-direction: column; justify-content: center; position: relative; }
        .active { display: flex; }
        #word-display { font-size: 4.5rem; font-weight: bold; text-transform: uppercase; z-index: 10; pointer-events: none; }
        #timer { font-size: 3rem; font-weight: bold; position: absolute; top: 10px; right: 20px; color: #ffeb3b; z-index: 20; }
        .btn { background: var(--primary); color: white; border: none; padding: 25px 50px; font-size: 2rem; border-radius: 15px; cursor: pointer; }
        
        /* Game Screen Setup */
        #game-screen { background: var(--secondary); color: white; transition: background 0.3s; cursor: pointer; }
        .flash-correct { background-color: var(--correct) !important; }
        .flash-pass { background-color: var(--pass) !important; }
        
        /* Tap Zones for Manual Backup */
        .tap-zone { position: absolute; top: 0; height: 100%; width: 50%; z-index: 5; }
        #pass-zone { left: 0; }
        #correct-zone { right: 0; }
    </style>
</head>
<body>

    <div id="start-screen" class="screen active">
        <h1>🌍 COASTS 30s</h1>
        <p>Nod Down: Correct | Tilt Up: Pass<br>(Or tap left/right of screen)</p>
        <button class="btn" onclick="requestPermission()">START</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="timer">30</div>
        <div id="word-display">READY?</div>
        <div id="pass-zone" class="tap-zone" onclick="action(false)"></div>
        <div id="correct-zone" class="tap-zone" onclick="action(true)"></div>
    </div>

    <div id="results-screen" class="screen">
        <h1>Time's Up!</h1>
        <div id="final-score" style="font-size: 4rem; color: var(--primary);"></div>
        <button class="btn" onclick="location.reload()">PLAY AGAIN</button>
    </div>
